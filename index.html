<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body class="body">
    <div class="cv-page">
      <div class="heading">
        <h1 class="heading__my_name">Mateusz Jackowski</h1>
        <h2 class="heading__position">Frontend Developer</h2>
        <div class="heading__contact">
          <div class="heading__contact_item">
            <img
              class="heading__contact_icon"
              src="./assets/alternate_email.svg"
              alt="email"
            />
            <span>mat.jackowski@icloud.com</span>
          </div>
          <div class="heading__contact_item">
            <img
              class="heading__contact_icon"
              src="./assets/phone.svg"
              alt="phone"
            />
            <span>+48 795 193 833</span>
          </div>
          <div class="heading__contact_item">
            <img
              class="heading__contact_icon"
              src="./assets/location_on.svg"
              alt="location"
            />
            <span>Gdynia, Tricity</span>
          </div>
          <div class="heading__contact_item">
            <img
              class="heading__contact_icon"
              src="./assets/account_circle.svg"
              alt="linked_in"
            />
            <a href="https://www.linkedin.com/in/m-jackowski/"
              >linkedin.com/in/m-jackowski/</a
            >
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
